
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login • Almighty Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/auth.css">
</head>

<body>

<header>
  <b>Almighty Portal</b>
  <button id="themeToggle" class="icon-btn"></button>
</header>

<main class="auth-main">

  <div class="auth-card">

    <h1 id="formTitle">Welcome Back</h1>
    <p id="formSub">Login to continue your tests</p>

    <form id="authForm">

      <input type="text" placeholder="Email or Username" required>
      <input type="password" placeholder="Password" required>

      <button type="submit">Login</button>

    </form>

    <div class="switch">
      <span id="switchText">New here?</span>
      <button id="switchBtn">Create account</button>
    </div>

  </div>

</main>

<script src="scripts/script.js"></script>
<script src="scripts/auth.js"></script>

</body>
</html>
